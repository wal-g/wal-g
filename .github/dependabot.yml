version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/otel"
          - "go.opentelemetry.io/otel/*"
      azure-sdk:
        patterns:
          - "github.com/Azure/azure-sdk-for-go/*"
      google-cloud-go:
        patterns:
          - "cloud.google.com/go"
          - "cloud.google.com/go/*"
  - package-ecosystem: "gomod"
    directory: "/cmd/pg/exporter"
    schedule:
      interval: "weekly"
