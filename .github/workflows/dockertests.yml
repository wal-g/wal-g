name: Docker tests

on:
  workflow_call:
    inputs:
      command-json-array:
        required: true
        type: string

env:
  CACHE_FOLDER: ~/docker-images-${{ github.sha }}
  CACHE_FILE_UBUNTU_18_04: ~/docker-images-${{ github.sha }}/wal-g_ubuntu-18.04.tar
  CACHE_FILE_UBUNTU_22_04: ~/docker-images-${{ github.sha }}/wal-g_ubuntu-22.04.tar
  CACHE_FILE_GOLANG: ~/docker-images-${{ github.sha }}/wal-g_golang.tar
  CACHE_FILE_PG10_TESTS: ~/docker-images-${{ github.sha }}/pg10_tests.tar
  CACHE_FILE_PG18_TESTS: ~/docker-images-${{ github.sha }}/pg18_tests.tar
  IMAGE_PG10_TESTS: wal-g/pg10_tests
  IMAGE_PG18_TESTS: wal-g/pg18_tests
  IMAGE_GOLANG: wal-g/golang
  IMAGES_CACHE_KEY: docker-images-${{ github.sha }}
  GO_VERSION: "1.25"
  LIBSODIUM_VERSION: "1.0.20"

jobs:
  buildimages:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      #  use cache to pass docker images to the test jobs
      - name: Docker images caching
        id: cache-images
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.CACHE_FILE_PG10_TESTS }}
            ${{ env.CACHE_FILE_PG18_TESTS }}
            ${{ env.CACHE_FILE_UBUNTU_18_04 }}
            ${{ env.CACHE_FILE_UBUNTU_22_04 }}
            ${{ env.CACHE_FILE_GOLANG }}
            ${{ env.CACHE_FOLDER }}/wal-g_mongo-base-*.tar
          key: ${{ env.IMAGES_CACHE_KEY }}

      - name: Cleanup space on runner
        run: |
          swapon --show=NAME --noheadings | while read swap_device; do
            sudo swapoff $swap_device
          done
  
          if [ -e /swapfile ]; then
            sudo rm /swapfile
          fi

      - name: Install deps
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: sudo apt clean && sudo apt-get install liblzo2-dev

      - name: Check out code into the Go module directory
        if: steps.cache-images.outputs.cache-hit != 'true'
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go 1.x
        if: steps.cache-images.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go

      - name: Set up Docker Buildx
        if: steps.cache-images.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v4

      # build images
      - name: Build images
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: make pg_save_image mongo_save_images
    env:
      USE_BROTLI: 1
      USE_LZO: 1
      # route docker compose build through buildx bake so per-service cache_from / cache_to in docker-compose.bake.yml take effect
      COMPOSE_BAKE: "true"
      COMPOSE_FILE: docker-compose.yml:docker-compose.bake.yml

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [ buildimages ]
    strategy:
      matrix:
        # GH Actions lack of complex types support for inputs.
        # Workaround https://github.com/orgs/community/discussions/11692#discussioncomment-3187271
        command: ${{ fromJSON(inputs.command-json-array) }}
      # do not cancel all tests if one failed
      fail-fast: false
    steps:
      - name: Install deps
        run: sudo apt-get install liblzo2-dev

      - name: Check out code into the Go module directory
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go

      # load docker images
      - name: Load docker images
        id: cache-images
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.CACHE_FILE_PG10_TESTS }}
            ${{ env.CACHE_FILE_PG18_TESTS }}
            ${{ env.CACHE_FILE_UBUNTU_18_04 }}
            ${{ env.CACHE_FILE_UBUNTU_22_04 }}
            ${{ env.CACHE_FILE_GOLANG }}
            ${{ env.CACHE_FOLDER }}/wal-g_mongo-base-*.tar
          key: ${{ env.IMAGES_CACHE_KEY }}

      - name: Fail if no cached images
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: |
          echo "Failed to fetch cached docker images. Will now exit..."
          exit 1

      - name: Run test
        run: ${{ matrix.command }}

      - name: Collect container logs
        if: always()
        run: |
          set +e
          mkdir -p container-logs
          # wal-g_* covers pg/mysql/etcd/etc; *.test_net_* covers mongo/redis
          containers=$(docker ps -a --filter 'name=wal-g_' --filter 'name=test_net_' --format '{{.Names}}')
          for c in $containers; do
            mkdir -p "container-logs/$c"
            docker logs "$c" >"container-logs/$c/stdout.log" 2>"container-logs/$c/stderr.log"
            docker cp "$c:/var/log" "container-logs/$c/var-log" 2>/dev/null
          done
          ls -R container-logs || true

      - name: Sanitize artifact name
        if: always()
        id: artifact
        env:
          COMMAND: ${{ matrix.command }}
        run: |
          slug=$(printf '%s' "$COMMAND" | tr -c 'A-Za-z0-9._-' '_')
          echo "slug=$slug" >>"$GITHUB_OUTPUT"

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ steps.artifact.outputs.slug }}
          path: container-logs
          if-no-files-found: ignore
          retention-days: 14
    env:
      USE_BROTLI: 1
      USE_LIBSODIUM: 1
      USE_LZO: 1
