name: Docker tests

on:
  workflow_call:
    inputs:
      command-json-array:
        required: true
        type: string

env:
  CACHE_FOLDER: ~/docker-images-${{ github.sha }}
  CACHE_FILE_PG10_TESTS: ~/docker-images-${{ github.sha }}/pg10_tests.tar
  CACHE_FILE_PG18_TESTS: ~/docker-images-${{ github.sha }}/pg18_tests.tar
  COMMON_IMAGES_REPO: ghcr.io/${{ github.repository_owner }}/common
  IMAGE_PG10_TESTS: wal-g/pg10_tests
  IMAGE_PG18_TESTS: wal-g/pg18_tests
  IMAGE_GOLANG: wal-g/golang
  IMAGES_CACHE_KEY: docker-images-${{ github.sha }}
  THIRDPARTY_CACHE_FILE: docker-thirdparty.tar
  GO_VERSION: "1.25"

jobs:
  buildimages:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      #  use cache to pass docker images to the test jobs
      - name: Docker images caching
        id: cache-images
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.CACHE_FILE_PG10_TESTS }}
            ${{ env.CACHE_FILE_PG18_TESTS }}
          key: ${{ env.IMAGES_CACHE_KEY }}

      - name: Cleanup space on runner
        run: |
          swapon --show=NAME --noheadings | while read swap_device; do
            sudo swapoff $swap_device
          done
  
          if [ -e /swapfile ]; then
            sudo rm /swapfile
          fi

      - name: Install deps
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: sudo apt clean && sudo apt-get install liblzo2-dev

      - name: Check out code into the Go module directory
        uses: actions/checkout@v7
        with:
          submodules: true

      # commit-invariant tar of third-party images for test jobs, refresh on miss;
      # lookup-only: buildimages never consumes the tar itself
      - name: Third-party images cache
        id: cache-thirdparty
        uses: actions/cache@v5
        with:
          path: ${{ env.THIRDPARTY_CACHE_FILE }}
          key: thirdparty-images-${{ hashFiles('ci_thirdparty_images.sh') }}
          lookup-only: true

      # login lets ghcr mirror stay private (packages pushed by workflows grant repo access)
      - name: Log in to ghcr
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Save third-party images
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: ./ci_thirdparty_images.sh save "$THIRDPARTY_CACHE_FILE"

      - name: Set up Go 1.x
        if: steps.cache-images.outputs.cache-hit != 'true'
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go

      - name: Set up Docker Buildx
        if: steps.cache-images.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v4

      # build images
      - name: Build images
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: make pg_save_image

      - name: Compute common images tag
        if: github.event_name == 'push' && steps.cache-images.outputs.cache-hit != 'true'
        id: common
        run: echo "tag=$(./ci_common_images_tag.sh)" >> "$GITHUB_OUTPUT"

      # publish commit-invariant images, pull_request tokens are read-only so master pushes only
      - name: Push common images to ghcr
        if: github.event_name == 'push' && steps.cache-images.outputs.cache-hit != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          tag="${{ steps.common.outputs.tag }}"
          push_if_absent() {
            if docker manifest inspect "$2:$tag" >/dev/null 2>&1; then
              echo "$2:$tag already published"
            else
              docker tag "$1" "$2:$tag" && docker push "$2:$tag"
            fi
          }
          push_if_absent wal-g/golang       "$COMMON_IMAGES_REPO/golang"
          push_if_absent wal-g/ubuntu:18.04 "$COMMON_IMAGES_REPO/ubuntu-18.04"
          push_if_absent wal-g/ubuntu:22.04 "$COMMON_IMAGES_REPO/ubuntu-22.04"
          push_if_absent wal-g/base         "$COMMON_IMAGES_REPO/base"
    env:
      USE_BROTLI: 1
      USE_LZO: 1
      # route docker compose build through buildx bake so per-service cache_from / cache_to in docker-compose.bake.yml take effect
      COMPOSE_BAKE: "true"
      COMPOSE_FILE: docker-compose.yml:docker-compose.bake.yml

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [ buildimages ]
    strategy:
      matrix:
        # GH Actions lack of complex types support for inputs.
        # Workaround https://github.com/orgs/community/discussions/11692#discussioncomment-3187271
        command: ${{ fromJSON(inputs.command-json-array) }}
      # do not cancel all tests if one failed
      fail-fast: false
    steps:
      - name: Install deps
        run: sudo apt-get install liblzo2-dev

      - name: Check out code into the Go module directory
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go 1.x
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go

      # load docker images
      - name: Load docker images
        id: cache-images
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.CACHE_FILE_PG10_TESTS }}
            ${{ env.CACHE_FILE_PG18_TESTS }}
          key: ${{ env.IMAGES_CACHE_KEY }}

      - name: Fail if no cached images
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: |
          echo "Failed to fetch cached docker images. Will now exit..."
          exit 1

      # consumed by Makefile load_docker_common to pull common images from ghcr
      - name: Compute common images tag
        run: echo "COMMON_IMAGES_TAG=$(./ci_common_images_tag.sh)" >> "$GITHUB_ENV"

      # images land under canonical Docker Hub names, compose up finds them locally
      - name: Third-party images cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.THIRDPARTY_CACHE_FILE }}
          key: thirdparty-images-${{ hashFiles('ci_thirdparty_images.sh') }}

      - name: Load third-party images
        run: ./ci_thirdparty_images.sh load "$THIRDPARTY_CACHE_FILE"

      - name: Run test
        run: ${{ matrix.command }}

      - name: Collect container logs
        if: always()
        run: |
          set +e
          mkdir -p container-logs
          # wal-g_* covers pg/mysql/etcd/etc; *.test_net_* covers mongo/redis
          containers=$(docker ps -a --filter 'name=wal-g_' --filter 'name=test_net_' --format '{{.Names}}')
          for c in $containers; do
            mkdir -p "container-logs/$c"
            docker logs "$c" >"container-logs/$c/stdout.log" 2>"container-logs/$c/stderr.log"
            docker cp "$c:/var/log" "container-logs/$c/var-log" 2>/dev/null
          done
          ls -R container-logs || true

      - name: Sanitize artifact name
        if: always()
        id: artifact
        env:
          COMMAND: ${{ matrix.command }}
        run: |
          slug=$(printf '%s' "$COMMAND" | tr -c 'A-Za-z0-9._-' '_')
          echo "slug=$slug" >>"$GITHUB_OUTPUT"

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ steps.artifact.outputs.slug }}
          path: container-logs
          if-no-files-found: ignore
          retention-days: 14
    env:
      USE_BROTLI: 1
      USE_LIBSODIUM: 1
      USE_LZO: 1
