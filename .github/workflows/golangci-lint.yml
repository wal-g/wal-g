name: golangci-lint

on:
  push:
    branches: master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  GOEXPERIMENT: jsonv2

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: sudo apt-get install liblzo2-dev brotli libsodium-dev
      - uses: actions/checkout@v7
      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          # Required: the version of golangci-lint is required and must be specified without patch version: we always use the latest patch version.
          version: v2.12

  golangci-exporter:
    name: lint exporter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go
      # pg/exporter is a separate module; lint it under the repo-root .golangci.yml
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12
          working-directory: cmd/pg/exporter
